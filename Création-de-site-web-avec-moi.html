<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EbookLava IA - Sensei Lave</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1e;
            color: white;
            overflow-x: hidden;
        }
        /* Fond Lampe à Lave */
       .lava-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #8B5CF6, #EC4899, #F97316);
            filter: blur(100px);
            opacity: 0.3;
            animation: lavaMove 20s ease infinite;
        }
        @keyframes lavaMove {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(180deg); }
        }
        /* Glassmorphism */
       .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
        }
        /* Header */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
       .logo { font-size: 24px; font-weight: bold; }
       .logo span { color: #F97316; }

        /* Hero */
       .hero {
            padding: 80px 5%;
            text-align: center;
        }
       .hero h1 {
            font-size: clamp(32px, 6vw, 64px);
            margin-bottom: 20px;
            background: linear-gradient(90deg, #8B5CF6, #EC4899, #F97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
       .btn {
            padding: 15px 30px;
            background: linear-gradient(90deg, #8B5CF6, #F97316);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
       .btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(139,92,246,0.5); }

        /* Generator */
       .generator {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: white;
        }

        /* Sensei Lave Mascotte */
        #sensei {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
            z-index: 1000;
            cursor: pointer;
            transition: 0.3s;
        }
        #sensei:hover { transform: scale(1.1); }
       .sensei-body {
            width: 100%;
            height: 100%;
            background: #F97316;
            border-radius: 50%;
            position: relative;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
       .sensei-face {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
        }
       .sensei-outfit {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            transition: 0.5s;
        }
       .bubble {
            position: absolute;
            bottom: 120px;
            right: 0;
            background: white;
            color: black;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 200px;
            display: none;
            animation: popIn 0.3s;
        }
        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
       .bubble:after {
            content: '';
            position: absolute;
            bottom: -10px;
            right: 20px;
            border: 10px solid transparent;
            border-top-color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
           .hero h1 { font-size: 32px; }
            #sensei { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>
    <div class="lava-bg"></div>

    <header>
        <div class="logo">EbookLava <span>IA</span></div>
        <button class="btn" onclick="showLogin()">Connexion</button>
    </header>

    <section class="hero">
        <h1>Ton Ebook IA Sur-Mesure en 30sec - 5€</h1>
        <p>Sensei Lave génère ton ebook et se déguise selon ton thème 🔥</p>
        <br>
        <button class="btn" onclick="document.getElementById('gen').scrollIntoView()">Générer maintenant</button>
    </section>

    <section id="gen" class="generator glass">
        <h2>Générateur IA</h2>
        <input type="text" id="theme" placeholder="Ex: ebook drague, ebook muscu, ebook crypto...">
        <button class="btn" onclick="generate()">Générer le sommaire gratuit</button>
        <div id="result" style="margin-top:20px;"></div>
    </section>

    <!-- Sensei Lave -->
    <div id="sensei" onclick="senseiTalk()">
        <div class="sensei-body">
            <div class="sensei-face">😎</div>
            <div class="sensei-outfit" id="outfit">🧥</div>
        </div>
        <div class="bubble" id="bubble">Yo boss!</div>
    </div>

    <script>
        const outfits = {
            'drague': '🕶️', 'love': '🕶️', 'sexy': '🕶️',
            'muscu': '💪', 'sport': '💪', 'fitness': '💪',
            'crypto': '👔', 'business': '👔', 'money': '👔',
            'manga': '🥷', 'ninja': '🥷', 'anime': '🥷',
            'espace': '👨‍🚀', 'magie': '🧙',
            'default': '🧥'
        };

        const phrases = [
            "Yo boss! On génère quoi aujourd'hui?",
            "Cet ebook va faire du sale 🔥",
            "Tape ton thème et je me déguise!",
            "5€ et je te sors un bestseller",
            "Sensei Lave à ton service!",
            "Nouveau skin débloqué bientôt...",
            "Lave power activé 🌋"
        ];

        function generate() {
            const theme = document.getElementById('theme').value.toLowerCase();
            let outfit = outfits.default;

            for(let key in outfits) {
                if(theme.includes(key)) {
                    outfit = outfits[key];
                    break;
                }
            }

            // Change outfit avec animation
            document.getElementById('outfit').style.transform = 'scale(0)';
            setTimeout(() => {
                document.getElementById('outfit').innerHTML = outfit;
                document.getElementById('outfit').style.transform = 'scale(1)';
                senseiTalk(`Mode ${theme} activé!`);
            }, 300);

            // Affiche sommaire
            document.getElementById('result').innerHTML = `
                <div class="glass" style="padding:20px; margin-top:15px;">
                    <h3>Sommaire gratuit : ${theme}</h3>
                    <p>1. Introduction cheatée<br>2. 5 techniques secrètes<br>3. Plan d'action 7 jours<br>4. Bonus caché</p>
                    <button class="btn" style="margin-top:15px;">Débloquer PDF complet - 5€</button>
                    <p style="font-size:12px; opacity:0.7; margin-top:10px;">⚠️ Demo frontend. Pas de vrais paiements.</p>
                </div>
            `;
        }

        function senseiTalk(msg) {
            const bubble = document.getElementById('bubble');
            bubble.innerHTML = msg || phrases[Math.floor(Math.random() * phrases.length)];
            bubble.style.display = 'block';
            setTimeout(() => { bubble.style.display = 'none'; }, 3000);
        }

        function showLogin() {
            alert('Connexion Google sécurisée - Demo uniquement. Pas de mot de passe en dur!');
        }

        // Sensei parle tout seul
        setInterval(() => { senseiTalk(); }, 8000);
        senseiTalk("Yo! Clique sur moi 🔥");
    </script>

    <div style="text-align:center; padding:40px; opacity:0.5; font-size:12px;">
        ⚠️ Version démo frontend. Aucun vrai paiement. Ne pas mettre de mot de passe réel.
    </div>
</body>
</html>
